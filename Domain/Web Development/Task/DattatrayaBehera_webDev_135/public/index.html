<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enigma Coding Club</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>

        <div class="logo"><span><img style="    width: 40px;
    position: absolute;
    top: 22px;
    left: 8px;" src="https://enigmavssut.in/logo/enigma_contained.png" alt=""></span>ENIGMA</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#domains">Domains</a></li>
            <li><a href="#join">Join Us</a></li>
        </ul>
    </nav>

    <header id="home">
        <h1>Decode Your Potential</h1>
        <p>The ultimate hub for developers and designers.</p>
        <a href="#domains" class="btn">Explore Domains</a>
    </header>

    <section id="domains">
        <h2>Our Domains</h2>
        <div class="grid-container">
            <div class="card"><h3>Web Dev</h3></div>
            <div class="card"><h3>App Dev</h3></div>
            <div class="card"><h3>C++</h3></div>
            <div class="card"><h3>Cloud Computing</h3></div>
            <div class="card"><h3>Game Dev</h3></div>
            <div class="card"><h3>UI/UX</h3></div>
            <div class="card"><h3>Cyber Security</h3></div>
        </div>
    </section>

    <section id="join">
        <h2>Become a Member</h2>
        <form id="joinForm">
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <button type="submit">Submit Application</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
